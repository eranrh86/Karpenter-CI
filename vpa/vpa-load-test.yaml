apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: load-test-vpa
  namespace: load-test
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: load-test
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: stress
        controlledResources: ["cpu", "memory"]
        # K8s 1.35 — in-place resize, no pod restart required
        controlledValues: RequestsAndLimits
